<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <link rel="stylesheet" type="text/css" href="styles/popup.css">
  <link rel="stylesheet" type="text/css" href="styles/controls.css">
  <link rel="stylesheet" href="styles/modal.css" type="text/css" media="all" />
  <title data-i18n="defaulttitle"></title>
</head>

<body>
  <div id="header">
    <h1 data-i18n="header"></h1>
    <div id="security-mode-display">
      <span id="mode-label" data-i18n="securitymodetitle">Security Mode:</span>
      <span id="current-mode" data-i18n="normalmodetitle">Normal Mode</span>
    </div>
    <a id="options-link" data-i18n="gotooptions" data-action="open-options">Go to options page ⚙️</a>
    <p data-i18n="paragraph"></p>
  </div>
  
  <div id="motivational-quote"></div>
  
  <div id="focus-session-section" class="focus-section hidden">
    <div class="focus-header">
      <h3 data-i18n="focussessionheader"></h3>
      <span class="focus-info" data-i18n="focussessioninfo"></span>
    </div>
    <div id="focus-controls">
      <div id="focus-start-view">
        <div class="duration-control">
          <label for="focus-duration" data-i18n="focussessionduration"></label>
          <input type="number" id="focus-duration" value="25" min="1" max="240">
          <small id="focus-pro-note" class="pro-note hidden" data-i18n="focussessionprofeature"></small>
        </div>
        <div id="focus-mode-control" class="focus-mode-control hidden">
          <label for="focus-mode-select" data-i18n="focussessionmode">Mode:</label>
          <select id="focus-mode-select">
            <option value="blacklist" data-i18n="focusmodeblacklist">Block Blacklist</option>
            <option value="whitelist" data-i18n="focusmodewhitelist">Allow Whitelist Only</option>
          </select>
        </div>
        <div id="hardcore-mode-control" class="hardcore-control hidden">
          <input type="checkbox" id="focus-hardcore-mode">
          <label for="focus-hardcore-mode" data-i18n="focussessionhardcore"></label>
        </div>
        <button id="start-focus-btn" class="action-btn" data-i18n="focussessionstart"></button>
      </div>
      <div id="focus-active-view" class="hidden">
        <div id="focus-timer-display">00:00</div>
        <button id="stop-focus-btn" class="action-btn delete-btn" data-i18n="focussessionstop"></button>
      </div>
    </div>
  </div>
  
  <div class="controls">
    <button id="add-rule" title="Add new rule" data-i18n="addrule"></button>
    <button id="add-whitelist-rule" title="Pro mode required" data-i18n="addwhitelistrule" disabled></button>
    
    <button id="feedback-btn" title="Send feedback">
      <span data-i18n="sendfeedbackbutton">Send Feedback</span>
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
        <path d="M20 4H4C2.897 4 2 4.897 2 6v12c0 1.103.897 2 
             2 2h16c1.103 0 2-.897 2-2V6c0-1.103-.897-2-2-2zM4 
             6h16l-8 5L4 6zm0 12V8l8 5 8-5v10H4z" />
      </svg>
    </button>
  </div>
  <output id="status"></output>
  <div id="rules-container"></div>
  
  <div id="passwordModal" class="modal hidden">
    <div class="modal-content">
      <h3 id="modalTitle">Set Password</h3>
      <input type="password" id="passwordInput1" placeholder="Enter password" data-i18n-placeholder="enterpassword">
      <input type="password" id="passwordInput2" placeholder="Confirm password" data-i18n-placeholder="confirmpassword">
      <button id="confirmPassword" data-i18n="modalconfirm">Confirm</button>
      <button id="cancelPassword" data-i18n="modalcancel">Cancel</button>
      <p id="passwordError" class="error hidden"></p>
      <a id="forgotPassword" class="hidden" href="#" data-i18n="forgotpassword">Forgot password? Reset (will clear protection)</a>
    </div>
  </div>
  
  <div class="privacy-container">
    <div class="privacy-badge" title="We do not track your history">
      <span>🔒</span><span data-i18n="privacysecured">Privacy Secured</span>
    </div>
  </div>
  
  <button id="scrollToTopBtn" class="scrollToTopBtn">↑</button>
  
  <script type="module" src="scripts/i18n.js"></script>
  <script type="module" src="popup.js"></script>
</body>

</html>
